name: Lunch Status

on:
  schedule:
      - cron: '0 5 * * 1-5'  # UTC 05:00 = KST 14:00, 평일만

      jobs:
        set-lunch:
            runs-on: ubuntu-latest
                steps:
                      - uses: actions/checkout@v4
                            - uses: actions/setup-python@v5
                                    with:
                                              python-version: '3.11'
                                                    - run: pip install requests
                                                          - run: python set_status.py
                                                                  env:
                                                                            SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
